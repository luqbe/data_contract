resources:
  pipelines:
    demo_contract:
      name: ${bundle.target}_dlt_contract
      libraries:
        - glob:
            # This ensures all notebooks/files in src are included
            include: ../src/contract/transformations/**
            # Or use notebooks if that's what you're using:
            # include: "../src/*.ipynb"
      catalog: data_contract_demo
      target: orders_data # This is the DLT 'schema' setting
      photon: true
      serverless: true
      root_path: ../src/contract
