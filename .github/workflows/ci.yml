name: Databricks DAB & Contract Validate
on:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  CI:
    name: Databricks DAB & Contract Validation
    runs-on: ubuntu-latest
    environment: lab
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Data Contract CLI
        run: pip install "datacontract-cli[databricks]"

      - name: Data Contract Lint & Violation Check
        env:
          DATACONTRACT_DATABRICKS_TOKEN: ${{ secrets.DAB_DEPLOY }}
          DATACONTRACT_DATABRICKS_HOST: ${{ vars.DAB_DEPLOY }}
        run: |
          # Check YAML syntax
          datacontract lint resources/datacontract.yml
          
          # Check for data violations (Ensure 'production' is defined in your YAML)
          datacontract test resources/datacontract.yml --server production

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: DAB Validation
        env:
          DATABRICKS_HOST: ${{ vars.DAB_DEPLOY }}
          DATABRICKS_TOKEN: ${{ secrets.DAB_DEPLOY }}
        run: |
          cd bundles
          databricks bundle validate -p lab -t lab